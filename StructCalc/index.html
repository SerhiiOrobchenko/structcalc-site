<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>StructCalc — Structural Load Workspace</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-name">StructCalc</span>
      <span class="brand-sub">Structural load workspace — ASCE 7-22 &amp; NBCC 2015</span>
    </div>

    <div class="project-bar">
      <label for="projectSelect" class="sr-only">Project</label>
      <select id="projectSelect" title="Active project"></select>
      <button id="btnNewProject" class="btn" title="Create a new project">+ New</button>
      <button id="btnDuplicateProject" class="btn" title="Duplicate the active project">Duplicate</button>
      <button id="btnRenameProject" class="btn" title="Rename the active project">Rename</button>
      <button id="btnDeleteProject" class="btn btn-danger" title="Delete the active project">Delete</button>
      <span class="sep"></span>
      <button id="btnExportProject" class="btn" title="Download the active project as a .json file">Export .json</button>
      <button id="btnImportProject" class="btn" title="Load a project from a .json file">Import .json</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
      <span class="sep"></span>
      <label for="codeSelect" class="bar-label">Code</label>
      <select id="codeSelect" title="Design code — switches the engine used by every calculation in this project">
        <option value="ASCE 7-22">ASCE 7-22 (USA)</option>
        <option value="NBCC 2015">NBCC 2015 (Canada)</option>
      </select>
      <label for="unitsSelect" class="bar-label">Units</label>
      <select id="unitsSelect" title="Unit system for new/unsaved calculations">
        <option value="US">US / Imperial</option>
        <option value="SI">SI</option>
      </select>
    </div>
  </header>

  <div class="shell-body">
    <nav class="sidebar" id="sidebar"></nav>

    <main class="content">
      <iframe id="moduleFrame" title="Calculation module"></iframe>
      <div id="modulePlaceholder" class="placeholder" style="display:none"></div>
    </main>
  </div>

  <footer class="statusbar" id="statusbar"></footer>

  <!-- New project dialog: pick design code + unit system upfront (stored in project settings) -->
  <div class="modal-overlay" id="newProjectModal">
    <div class="modal-box">
      <button type="button" class="modal-close" id="newProjectClose" aria-label="Close">&times;</button>
      <h3>New project</h3>
      <div class="field">
        <label for="npName">Project name</label>
        <input type="text" id="npName" placeholder="Project name">
      </div>
      <div class="field">
        <label for="npCode">Design code / standard</label>
        <select id="npCode">
          <option value="ASCE 7-22">ASCE 7-22 (United States)</option>
          <option value="NBCC 2015">NBCC 2015 (Canada)</option>
        </select>
      </div>
      <div class="field">
        <label for="npUnits">Unit system</label>
        <select id="npUnits">
          <option value="US">US / Imperial (psf, ft)</option>
          <option value="SI">SI (kPa, m)</option>
        </select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-primary" id="npCreate">Create project</button>
      </div>
    </div>
  </div>

  <!-- Add calculation dialog: pick a module type (Snow, Wind, Seismic, ...) to add
       to the active project. The engine used depends on the Code selector above. -->
  <div class="modal-overlay" id="addCalcModal">
    <div class="modal-box modal-box-wide">
      <button type="button" class="modal-close" id="addCalcClose" aria-label="Close">&times;</button>
      <h3>Add calculation</h3>
      <div class="calc-type-grid" id="calcTypeGrid"></div>
      <div class="field">
        <label for="acDescription">Description (optional)</label>
        <input type="text" id="acDescription" placeholder="e.g. left canopy, grid A">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-primary" id="acAdd" disabled>Add to project</button>
      </div>
    </div>
  </div>

  <script src="shell.js"></script>
</body>
</html>
